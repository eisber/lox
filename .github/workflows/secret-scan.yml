name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for credentials
        run: |
          FAILED=0

          # Scan for private keys in non-test, non-workflow files
          if grep -rnP 'PRIVATE KEY|BEGIN RSA|BEGIN EC PRIVATE' \
              --include='*.rs' --include='*.py' --include='*.toml' \
              --include='*.yaml' --include='*.md' --include='*.json' \
              --exclude-dir=.github --exclude='*test*' . 2>/dev/null; then
            echo "::error::Found private key pattern in source files"
            FAILED=1
          fi

          # Scan for hardcoded credentials (IP:password patterns)
          if grep -rnP 'password\s*[:=]\s*"[^"]{6,}"' \
              --include='*.rs' --include='*.py' --include='*.toml' \
              --exclude='*test*' --exclude='*example*' --exclude='*mock*' \
              . 2>/dev/null | grep -v '//.*test\|//.*example\|fn test_\|#\[test\]'; then
            echo "::error::Found hardcoded password pattern"
            FAILED=1
          fi

          # Check for Loxone config files
          LOXONE=$(find . -iname '*.Loxone' -o -iname '*.LoxCC' | grep -v target/ || true)
          if [ -n "$LOXONE" ]; then
            echo "::error::Loxone config files found: $LOXONE"
            FAILED=1
          fi

          if [ $FAILED -ne 0 ]; then
            echo "::error::Secret scan failed — review flagged patterns above"
            exit 1
          fi

          echo "✓ No credential patterns detected"

      - name: Check for high-entropy strings in new code
        if: github.event_name == 'pull_request'
        run: |
          # Simple entropy check on new lines in PR
          git diff origin/main...HEAD --diff-filter=ACMR -U0 -- '*.rs' '*.py' '*.toml' | \
            grep '^+' | grep -v '^+++' | \
            grep -P '[A-Za-z0-9+/=]{32,}' | \
            grep -v '//\|#\|test\|example\|mock\|sha256\|sha1\|uuid' | \
            head -10 > /tmp/entropy_hits || true

          if [ -s /tmp/entropy_hits ]; then
            echo "::warning::Possible secrets (high-entropy strings in new code):"
            cat /tmp/entropy_hits
            echo "Review these manually — they may be test data or legitimate constants."
          fi
