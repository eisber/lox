name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for credentials
        run: |
          FAILED=0

          # Credential patterns — add environment-specific ones locally
          # via the pre-commit hook in .git/hooks/pre-commit
          PATTERNS=(
            'PRIVATE KEY'
            'BEGIN RSA'
            'BEGIN EC PRIVATE'
            'admin:[^@]+@192\.168\.'
          )

          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(grep -rnP "$pattern" --include='*.rs' --include='*.py' --include='*.toml' --include='*.yaml' --include='*.yml' --include='*.md' --include='*.json' . 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "::error::Found credential pattern: $pattern"
              echo "$MATCHES" | head -5
              FAILED=1
            fi
          done

          # Check for Loxone config files
          LOXONE=$(find . -iname '*.Loxone' -o -iname '*.LoxCC' | grep -v target/ || true)
          if [ -n "$LOXONE" ]; then
            echo "::error::Loxone config files found: $LOXONE"
            FAILED=1
          fi

          if [ $FAILED -ne 0 ]; then
            echo "::error::Secret scan failed — review flagged patterns above"
            exit 1
          fi

          echo "✓ No credential patterns detected"

      - name: Check for high-entropy strings in new code
        if: github.event_name == 'pull_request'
        run: |
          # Simple entropy check on new lines in PR
          git diff origin/main...HEAD --diff-filter=ACMR -U0 -- '*.rs' '*.py' '*.toml' | \
            grep '^+' | grep -v '^+++' | \
            grep -P '[A-Za-z0-9+/=]{32,}' | \
            grep -v '//\|#\|test\|example\|mock\|sha256\|sha1\|uuid' | \
            head -10 > /tmp/entropy_hits || true

          if [ -s /tmp/entropy_hits ]; then
            echo "::warning::Possible secrets (high-entropy strings in new code):"
            cat /tmp/entropy_hits
            echo "Review these manually — they may be test data or legitimate constants."
          fi
